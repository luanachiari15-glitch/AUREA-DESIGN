<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurea Design</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/VyMz9wz.png" />
    <link rel="apple-touch-icon" href="https://i.imgur.com/VyMz9wz.png" />
    <script>
      // Prevent polyfills from crashing when trying to overwrite read-only window.fetch
      (function() {
        try {
          var desc = Object.getOwnPropertyDescriptor(window, 'fetch');
          if (desc && !desc.set && desc.configurable) {
            var _fetch = window.fetch;
            Object.defineProperty(window, 'fetch', {
              configurable: true,
              enumerable: true,
              get: function() { return _fetch; },
              set: function() { /* ignore */ }
            });
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
